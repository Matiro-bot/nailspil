<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NailsPil | Arte en tus manos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #fffafb; color: #4a4a4a; }
        h1, h2 { font-family: 'Cormorant Garamond', serif; }
        .gradient-text { background: linear-gradient(to right, #ff85a2, #ffb7c5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-rose { background: linear-gradient(to right, #ff85a2, #ffb7c5); transition: all 0.3s; }
        .btn-rose:hover { transform: scale(1.05); box-shadow: 0 10px 20px -10px #ff85a2; }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-50">
        <h1 class="text-3xl font-bold gradient-text">NailsPil</h1>
        <a href="#reservas" class="btn-rose text-white px-6 py-2 rounded-full text-sm font-semibold">Reservar Turno</a>
    </nav>

    <section class="text-center py-20 px-4">
        <h2 class="text-6xl md:text-8xl mb-6">Uñas que cuentan <br><span class="italic">tu historia.</span></h2>
        <p class="text-gray-500 max-w-xl mx-auto mb-10 text-lg leading-relaxed">Estilo romántico, terminaciones perfectas y el cuidado que tus manos merecen.</p>
        <div class="flex justify-center gap-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-pink-50">
                <span class="block text-2xl font-bold text-pink-400">+500</span>
                <span class="text-xs text-gray-400 uppercase tracking-widest">Diseños Realizados</span>
            </div>
        </div>
    </section>

    <section class="max-w-6xl mx-auto py-20 px-4">
        <h3 class="text-3xl mb-12 text-center underline decoration-pink-200">Galería de Trabajos</h3>
        <div id="galeria-container" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <p class="text-center col-span-full italic text-gray-400">Cargando diseños exclusivos de NailsPil...</p>
        </div>
    </section>

    <section id="reservas" class="bg-white py-20 px-4">
        <div class="max-w-2xl mx-auto bg-pink-50/30 p-10 rounded-3xl border border-pink-100">
            <h3 class="text-4xl mb-8 text-center">Pedí tu turno</h3>
            <form id="form-reserva" class="space-y-6">
                <input type="text" id="nombre" placeholder="Nombre completo" class="w-full p-4 rounded-xl border-none ring-1 ring-pink-100 focus:ring-2 focus:ring-pink-300 outline-none" required>
                <input type="tel" id="telefono" placeholder="WhatsApp (ej: 1122334455)" class="w-full p-4 rounded-xl border-none ring-1 ring-pink-100 focus:ring-2 focus:ring-pink-300 outline-none" required>
                <select id="servicio" class="w-full p-4 rounded-xl border-none ring-1 ring-pink-100 focus:ring-2 focus:ring-pink-300 outline-none">
                    <option value="Esculpidas">Esculpidas</option>
                    <option value="Semipermanente">Semipermanente</option>
                    <option value="Nail Art">Nail Art Creativo</option>
                    <option value="Soft Gel">Soft Gel</option>
                </select>
                <button type="submit" class="w-full btn-rose text-white py-4 rounded-xl font-bold text-lg">Confirmar por WhatsApp</button>
            </form>
        </div>
    </section>

    <footer class="text-center py-10 text-gray-400 text-sm">
        &copy; 2026 NailsPil - Creado con ❤️ para Pili
    </footer>

    <script>
        // CONFIGURACIÓN SUPABASE - YA ESTÁ LISTA CON TUS DATOS
        const supabaseUrl = 'https://eqtyvtleznnkrdoepakl.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxdHl2dGxlem5ua3Jkb2VwYWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzODUzNDcsImV4cCI6MjA4OTk2MTM0N30.tzkG1GoO8ELu9fhjY8w00s6bdN5qbhU05NsH7Jk2AJw'; 
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // 1. CARGAR GALERÍA (Busca fotos en la tabla 'galeria')
        async function cargarGaleria() {
            const { data, error } = await supabase.from('galeria').select('*');
            const container = document.getElementById('galeria-container');
            
            if (data && data.length > 0) {
                container.innerHTML = data.map(item => `
                    <div class="group relative overflow-hidden rounded-2xl shadow-lg transition-transform hover:-translate-y-2">
                        <img src="${item.foto_url}" class="w-full h-80 object-cover" alt="${item.titulo}">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-6">
                            <h4 class="text-white font-bold">${item.titulo}</h4>
                            <p class="text-pink-200 text-sm">${item.tecnica}</p>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `<p class="text-center col-span-full italic text-gray-400">Próximamente fotos de nuevos diseños...</p>`;
            }
        }

        // 2. ENVIAR RESERVA A SUPABASE Y WHATSAPP
        document.getElementById('form-reserva').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const datos = {
                nombre: document.getElementById('nombre').value,
                telefono: document.getElementById('telefono').value,
                servicio: document.getElementById('servicio').value,
                fecha: new Date().toISOString().split('T')[0]
            };

            // Guardar en la tabla 'turnos'
            const { error } = await supabase.from('turnos').insert([datos]);

            if (error) {
                console.error(error);
                alert('Ocurrió un error al guardar el turno.');
            } else {
                // Abrir WhatsApp con el mensaje (Cambiá el número acá si querés)
                const mensaje = `¡Hola NailsPil! Quiero reservar un turno de ${datos.servicio}. Mi nombre es ${datos.nombre}.`;
                window.open(`https://wa.me/5491100000000?text=${encodeURIComponent(mensaje)}`, '_blank'); 
                alert('¡Turno solicitado con éxito!');
                e.target.reset();
            }
        });

        cargarGaleria();
    </script>
</body>
</html>
